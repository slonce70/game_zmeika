<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="header">
      <button class="leaderboard-btn">Таблица лидеров</button>
      <div class="score">
        <span class="score-label">Score:</span>
        <span class="score-value">0</span>
      </div>
      <button class="restart-btn">Рестарт</button>
    </div>
    
    <div class="canvas-container"></div>
    
    <div class="mobile-controls">
      <button class="control-btn up-btn" data-direction="up">↑</button>
      <div class="horizontal-controls">
        <button class="control-btn left-btn" data-direction="left">←</button>
        <button class="control-btn right-btn" data-direction="right">→</button>
      </div>
      <button class="control-btn down-btn" data-direction="down">↓</button>
    </div>
  </div>

  <!-- Сайдбар для онлайн игроков -->
  <div id="onlinePlayersSidebar" class="sidebar">
    <button id="toggleSidebar" class="toggle-btn">
      <span class="arrow"></span>
    </button>
    <div class="sidebar-content">
      <h3>Online Players <span id="activePlayersCounter">0</span></h3>
      <div id="onlinePlayersList"></div>
      <div id="sidebarLeaderboard"></div>
    </div>
  </div>

  <!-- Мобильный индикатор онлайн игроков -->
  <div id="mobileOnlineIndicator">
    <div class="indicator-icon">👥</div>
    <span class="player-count">0</span>
  </div>

  <!-- Модальное окно для логина -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <h2>Введите имя</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Ваше имя" required>
        <button type="submit">Начать игру</button>
      </form>
    </div>
  </div>

  <!-- Модальное окно для таблицы лидеров -->
  <div class="modal-overlay" id="leaderboardModal" style="display: none;">
    <div class="modal">
      <h2>Таблица лидеров</h2>
      <table>
        <thead>
          <tr>
            <th>Rank</th>
            <th>Имя</th>
            <th>Счет</th>
            <th>Дата</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody">
        </tbody>
      </table>
      <button id="closeLeaderboard">Закрыть</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
